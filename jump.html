<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>跳一跳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0f23;
  touch-action:none;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  position:fixed;top:0;left:0}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";

var R=15, GRAV=0.43, PH=16;
var W,H,scale;
var c=document.getElementById('c');
var ctx=c.getContext('2d');

function resize(){
  W=window.innerWidth; H=window.innerHeight;
  scale=Math.min(W/440, H/720);
  c.width=W; c.height=H;
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',function(){setTimeout(resize,100);});
resize();

// ── helpers ──
function h2rgb(h){
  h=h.replace('#','');
  if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];
}
function mix(a,b,t){
  var r1=h2rgb(a), r2=h2rgb(b);
  return 'rgb('+Math.round(r1[0]+(r2[0]-r1[0])*t)+','+
    Math.round(r1[1]+(r2[1]-r1[1])*t)+','+
    Math.round(r1[2]+(r2[2]-r1[2])*t)+')';
}
function fillOval(cx,cy,rx,ry){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(1,ry/rx);
  ctx.beginPath();
  ctx.arc(0,0,rx,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}
function strokeOval(cx,cy,rx,ry,lw){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(1,ry/rx);
  ctx.beginPath();
  ctx.arc(0,0,rx,0,Math.PI*2);
  ctx.lineWidth=lw;
  ctx.stroke();
  ctx.restore();
}

// ── persistent best ──
var best=0;
try{best=parseInt(localStorage.jump_best,10)||0}catch(e){}

// ── state ──
var charging=false, flying=false, dead=false;
var score=0, combo=0;
var power=0, maxPower=30;
var squash=0, shake=0, perfectFlash=0, milestoneFlash=0;
var milestoneText='', comboText='';
var bx,by,vx,vy,camY;
var worldPlats=[], worldPlatTypes=[];
var particles=[], stars=[];

function initStars(){
  stars=[];
  for(var i=0;i<80;i++){
    stars.push([Math.random()*440, Math.random()*720, Math.random()*2, Math.random()*0.02-0.01]);
  }
}

function difficulty(){
  var s=score;
  return [
    Math.max(40, 70-Math.floor(s/4)),
    Math.min(200, 150+Math.floor(s/3)),
    Math.max(36, 68-Math.floor(s/8)),
    Math.max(48, 72-Math.floor(s/10)),
    Math.min(0.35, 0.08+s*0.012)
  ];
}

function genPlat(){
  var prev=worldPlats[worldPlats.length-1];
  var prevCX=prev[0]+prev[2]/2;
  var d=difficulty();
  var dMin=d[0], dMax=d[1], wMin=d[2], wMax=d[3], bP=d[4];
  var pw=Math.floor(Math.random()*(wMax-wMin))+wMin;
  var dir;
  if(worldPlats.length>=2){
    var lastDir=worldPlats[worldPlats.length-1][0]>worldPlats[worldPlats.length-2][0]?1:-1;
    dir=Math.random()<0.6?-lastDir:lastDir;
  }else{
    dir=Math.random()<0.5?-1:1;
  }
  var dist=Math.floor(Math.random()*(dMax-dMin))+dMin;
  var cx=prevCX+dir*dist;
  cx=Math.max(pw/2+8, Math.min(440-pw/2-8, cx));
  var py=prev[1]-Math.floor(Math.random()*65+45);
  worldPlats.push([cx-pw/2, py, pw]);
  var type='normal';
  if(Math.random()<bP) type=Math.random()<0.6?'bonus':'small';
  worldPlatTypes.push(type);
  if(worldPlats.length>6){worldPlats.shift();worldPlatTypes.shift();}
}

function newGame(){
  charging=false; flying=false; dead=false;
  score=0; combo=0; power=0; maxPower=30;
  squash=0; shake=0; perfectFlash=0; milestoneFlash=0;
  milestoneText=''; comboText=''; particles=[];
  worldPlats=[]; worldPlatTypes=[];
  var worldH=H/scale;
  var firstY=worldH - 170 - R;
  worldPlats.push([440/2-68/2, firstY, 68]); worldPlatTypes.push('normal');
  genPlat(); genPlat();
  var p0=worldPlats[0];
  bx=p0[0]+p0[2]/2;
  by=p0[1]-R;
  var ballZone=H*0.65/scale;
  camY=by-ballZone;
}

function toScreen(wx,wy){
  return [wx*scale, (wy-camY)*scale];
}

function emit(x,y,vx2,vy2,color,life,size,decay){
  particles.push({x:x,y:y,vx:vx2,vy:vy2,life:life,maxLife:life,color:color,size:size,decay:decay});
}

function emitRing(cx,cy,radius,color,life){
  for(var i=0;i<28;i++){
    var ang=i*2*Math.PI/28;
    emit(cx+Math.cos(ang)*radius, cy+Math.sin(ang)*radius,
      Math.cos(ang)*2.5, Math.sin(ang)*2.5, color, life, 2.5, 0.87);
  }
}

function perfect(x,y){
  for(var i=0;i<30;i++){
    var ang=Math.random()*2*Math.PI;
    var spd=Math.random()*6+2;
    var clr=['#ffd700','#ffec8b','#fff8dc','#ffb700'][Math.floor(Math.random()*4)];
    emit(x,y,Math.cos(ang)*spd,Math.sin(ang)*spd-2.5,clr,26,Math.random()*3+2,0.90);
  }
  emitRing(x,y-10,28,'#ffd700',12);
  emitRing(x,y-10,50,'#ffd700',12);
}

function bonusBurst(x,y){
  for(var i=0;i<16;i++){
    var ang=Math.random()*2*Math.PI;
    var spd=Math.random()*3+1;
    emit(x,y,Math.cos(ang)*spd,Math.sin(ang)*spd-1,'#00ffcc',18,2.5,0.89);
  }
}

function edgeLand(){
  var s=toScreen(bx,by);
  for(var i=0;i<8;i++){
    emit(s[0],s[1],(Math.random()-0.5)*4,(Math.random()-0.5)*3-2,'#ff6b6b',12,2,0.86);
  }
}

function dieFx(){
  dead=true; flying=false; combo=0; comboText='';
  var s=toScreen(bx,by);
  var sx=s[0], sy=Math.min(s[1],H-40);
  for(var i=0;i<55;i++){
    var ang=Math.random()*2*Math.PI;
    var spd=Math.random()*6.5+1.5;
    var clr=['#ff4757','#ff6b81','#ffa502','#ffeaa7','#fff'][Math.floor(Math.random()*5)];
    emit(sx,sy,Math.cos(ang)*spd,Math.sin(ang)*spd-3,clr,30,Math.random()*3+2,0.93);
  }
  for(var rs=0;rs<4;rs++){
    (function(r){
      setTimeout(function(){emitRing(sx,sy,40+r*45,'#fff',12);},r*50);
    })(rs);
  }
}

function predictLanding(){
  if(!charging) return null;
  var ratio=Math.min(power/maxPower, 1);
  if(ratio<0.05) return null;
  var cur=worldPlats[0], nxt=worldPlats[1];
  var dx=(nxt[0]+nxt[2]/2)-(cur[0]+cur[2]/2);
  var vx2=dx/23*(0.85+ratio*1.2);
  var vy2=-7-ratio*8;
  var px=bx, py=by;
  for(var i=0;i<200;i++){
    vy2+=GRAV; px+=vx2; py+=vy2;
    if(py-camY>H/scale+200||px<-200||px>640) return null;
    var nxt2=worldPlats[1];
    if(vy2>0&&nxt2[1]-R-10<=py&&py<=nxt2[1]+10&&nxt2[0]-R<=px&&px<=nxt2[0]+nxt2[2]+R){
      return toScreen(px,nxt2[1]-R);
    }
  }
  return null;
}

// ── input ──
function startCharge(e){
  if(e) e.preventDefault();
  if(dead){
    newGame();
    return;
  }
  if(flying) return;
  charging=true;
}

function doJump(e){
  if(e) e.preventDefault();
  if(!charging||dead||flying) return;
  charging=false;
  var p=power; power=0;
  if(p<1.2) return;
  flying=true;
  var cur=worldPlats[0], nxt=worldPlats[1];
  var dx=(nxt[0]+nxt[2]/2)-(cur[0]+cur[2]/2);
  var ratio=Math.min(p/maxPower, 1);
  vx=dx/23*(0.85+ratio*1.2);
  vy=-7-ratio*8;
  var s=toScreen(bx,by);
  for(var i=0;i<6;i++) emit(s[0],s[1],0,0,'#fff',7,1.5,0.83);
}

c.addEventListener('touchstart', startCharge, {passive:false});
c.addEventListener('touchend', doJump, {passive:false});
c.addEventListener('touchcancel', doJump, {passive:false});
c.addEventListener('mousedown', startCharge);
c.addEventListener('mouseup', doJump);
c.addEventListener('mouseleave', doJump);

document.addEventListener('keydown', function(e){
  if(e.code==='Space'||e.keyCode===32){e.preventDefault();startCharge(e);}
});
document.addEventListener('keyup', function(e){
  if(e.code==='Space'||e.keyCode===32){e.preventDefault();doJump(e);}
});

// Ensure canvas always fills screen
window.addEventListener('resize', function(){
  W=window.innerWidth; H=window.innerHeight;
  scale=Math.min(W/440, H/720);
  c.width=W; c.height=H;
  // Recalc cam on resize so ball stays in view
  if(!dead&&!flying&&worldPlats.length>0){
    var ballZone=H*0.65/scale;
    camY=by-ballZone;
  }
});

// ── game loop ──
function tick(){
  try{
    // charge
    if(charging){
      power+=0.7;
      if(power>=maxPower){power=maxPower; doJump();}
    }

    // flight
    if(flying&&!dead){
      vy+=GRAV; bx+=vx; by+=vy;

      if(Math.abs(vy)>1.5){
        var s=toScreen(bx,by);
        emit(s[0]+(Math.random()-0.5)*10, s[1]+(Math.random()-0.5)*10, 0,0,'#ffe8b0',7,1,0.78);
      }

      if(vy>0&&worldPlats.length>=2){
        var nxt=worldPlats[1];
        var nx=nxt[0], ny=nxt[1], nw=nxt[2];
        var ptype=worldPlatTypes[1]||'normal';
        var onY=ny-R-10<=by&&by<=ny+10;
        var onX=nx-R<=bx&&bx<=nx+nw+R;

        if(onY&&!onX){
          if(nx-R-6<=bx&&bx<nx-R){bx=nx-R+1; onX=true;}
          else if(nx+nw+R<bx&&bx<=nx+nw+R+6){bx=nx+nw+R-1; onX=true;}
        }

        if(onY&&onX){
          by=ny-R; vx=0; vy=0; flying=false; squash=1;
          var mid=nx+nw/2;
          var off=Math.abs(bx-mid)/(nw/2);
          var pts=1;

          if(off<0.25){
            pts++; combo+=2; perfectFlash=1;
            var ppos=toScreen(mid,ny);
            perfect(ppos[0],ppos[1]);
            comboText='Perfect!';
          }else if(off>0.78){
            combo=0; shake=0.8; edgeLand(); comboText='';
          }else{
            combo++; comboText='';
          }

          if(ptype==='bonus'&&off<0.5){
            pts+=2; var bpos=toScreen(nx+nw/2,ny); bonusBurst(bpos[0],bpos[1]);
          }else if(ptype==='small'){
            pts++;
          }

          var oldScore=score;
          score+=pts;
          var oldM=Math.floor(oldScore/10), newM=Math.floor(score/10);
          if(newM>oldM){milestoneFlash=1; milestoneText=(newM*10)+'!';}
          maxPower=30+Math.floor(score/8);

          worldPlats.shift(); worldPlatTypes.shift();
          genPlat();

          if(score>best){best=score;
            try{localStorage.jump_best=best;}catch(e){}
          }
        }
      }

      if(by-camY>H/scale+120||bx<-100||bx>540){
        dieFx();
      }
    }

    // smooth camera
    if(!dead&&worldPlats.length>0){
      var ballZone=H*0.65/scale;
      var targetCam=by-ballZone;
      camY+=(targetCam-camY)*0.15;
    }

    // animate
    squash=Math.max(0,squash-0.06);
    shake=Math.max(0,shake-0.04);
    perfectFlash=Math.max(0,perfectFlash-0.04);
    milestoneFlash=Math.max(0,milestoneFlash-0.03);

    // particles
    var alive=[];
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      p.life--;
      if(p.life<=0) continue;
      p.vy+=0.07; p.x+=p.vx; p.y+=p.vy;
      p.size*=p.decay;
      alive.push(p);
    }
    particles=alive;

    draw();
  }catch(e){
    // prevent total crash, show error silently
    console&&console.log('tick error:',e);
  }
  requestAnimationFrame(tick);
}

function drawStar(cx,cy,size,color){
  ctx.beginPath();
  for(var i=0;i<10;i++){
    var ang=i*Math.PI/5-Math.PI/2;
    var r=i%2===0?size:size*0.4;
    if(i===0) ctx.moveTo(cx+Math.cos(ang)*r, cy+Math.sin(ang)*r);
    else ctx.lineTo(cx+Math.cos(ang)*r, cy+Math.sin(ang)*r);
  }
  ctx.closePath();
  ctx.fillStyle=color; ctx.fill();
  ctx.strokeStyle='#cc9900'; ctx.lineWidth=1; ctx.stroke();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  var shakeX=shake>0.01?(Math.random()-0.5)*10*scale:0;
  var shakeY=shake>0.01?(Math.random()-0.5)*10*scale:0;

  // bg
  var tScore=Math.min(1,score/80);
  var top=mix('#0a0a2e','#1a1040',tScore);
  var bot=mix('#162040','#2a1848',tScore);
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,top);
  grad.addColorStop(1,bot);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // stars
  for(var i=0;i<stars.length;i++){
    var st=stars[i];
    if(st[2]>0.8){
      var sr=st[2]*1.3*scale;
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.arc(st[0]*scale, st[1]*scale, sr, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // platforms
  for(var idx=0;idx<worldPlats.length;idx++){
    var plat=worldPlats[idx];
    var wx=plat[0], wy=plat[1], pw=plat[2];
    var scr=toScreen(wx,wy);
    var x=scr[0]+shakeX, y=scr[1]+shakeY;
    var pwS=pw*scale;
    if(y>H+100||y+PH*scale<-100) continue;

    var ptype=worldPlatTypes[idx]||'normal';
    var body,edge;
    if(idx===0){body='#3dd6c8';edge='#2aaaa0';}
    else if(idx===1){
      if(ptype==='bonus'){body='#ffb347';edge='#e09a30';}
      else if(ptype==='small'){body='#ff5e7a';edge='#e04860';}
      else{body='#ff6b6b';edge='#e05858';}
    }else{body='#4a5568';edge='#3a4558';}

    ctx.fillStyle='#08081c';
    ctx.fillRect(x+2*scale, y+(PH+2)*scale, pwS, 4*scale);
    ctx.fillStyle=body;
    ctx.fillRect(x, y, pwS, PH*scale);
    ctx.strokeStyle=edge; ctx.lineWidth=1*scale;
    ctx.strokeRect(x, y, pwS, PH*scale);
    ctx.fillStyle=mix(body,'#fff',0.3);
    ctx.fillRect(x+3*scale, y+1*scale, pwS-6*scale, 3*scale);

    if(idx===1){
      var mx=x+pwS/2;
      ctx.strokeStyle='#fff'; ctx.lineWidth=1*scale;
      ctx.beginPath();
      ctx.moveTo(mx-10*scale, y-5*scale); ctx.lineTo(mx-4*scale, y-12*scale);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx+10*scale, y-5*scale); ctx.lineTo(mx+4*scale, y-12*scale);
      ctx.stroke();
    }
    if(idx===1&&ptype==='bonus'&&!flying){
      drawStar(x+pwS/2, y-PH*scale-6*scale, 9*scale, '#ffd700');
    }
    if(idx===1&&ptype==='small'){
      ctx.fillStyle='#ff5e7a';
      ctx.font='bold '+(13*scale)+'px Arial';
      ctx.textAlign='center';
      ctx.fillText('!', x+pwS/2, y-PH*scale-4*scale);
    }
  }

  // prediction
  if(charging&&power>2){
    var pred=predictLanding();
    if(pred){
      for(var ring=5;ring>0;ring--){
        var ar=(R+ring*3)*scale;
        ctx.strokeStyle='rgba(136,170,204,0.5)';
        ctx.lineWidth=1*scale;
        ctx.beginPath();
        ctx.arc(pred[0], pred[1], ar, 0, Math.PI*2);
        ctx.stroke();
      }
    }
  }

  // ball screen coords
  var bs=toScreen(bx,by);
  var bx2=bs[0]+shakeX, by2=bs[1]+shakeY;

  // ball shadow
  if(!dead&&worldPlats.length>0){
    var p0=worldPlats[0];
    var scy=(p0[1]+PH+3-camY)*scale+shakeY;
    var shadowR=R*1.25*scale;
    ctx.fillStyle='rgba(13,13,36,0.6)';
    ctx.beginPath();
    ctx.save();
    ctx.translate(bx2, scy);
    ctx.scale(1, 0.2);
    ctx.arc(0, 0, shadowR, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ball
  var rx=R*scale, ry=R*scale;
  if(flying){
    var stretch=1-Math.max(-10,Math.min(10,vy))*0.032;
    ry=R*scale*stretch;
    rx=R*scale*(1+(1-stretch)*0.35);
  }else if(squash>0.01){
    rx=R*scale*(1+squash*0.45);
    ry=R*scale*(1-squash*0.4);
  }

  // glow
  var glowR=Math.max(rx,ry)+8*scale;
  ctx.strokeStyle='#443322'; ctx.lineWidth=3*scale;
  ctx.beginPath(); ctx.arc(bx2,by2,glowR,0,Math.PI*2); ctx.stroke();

  // gradient sphere
  for(var g=0;g<6;g++){
    var t=g/5;
    var sri=rx*(1-t*0.7);
    ctx.fillStyle=mix('#ffd93d','#e69500',t*0.6);
    fillOval(bx2,by2,sri,sri*(ry/rx));
  }
  ctx.strokeStyle='#d0a020'; ctx.lineWidth=1*scale;
  strokeOval(bx2,by2,rx,ry,1*scale);

  // specular
  ctx.fillStyle='#fffff0';
  fillOval(bx2-rx*0.28, by2-ry*0.42, rx*0.25, ry*0.22);

  // overlays
  if(perfectFlash>0.01){ctx.fillStyle='rgba(255,215,0,0.2)';ctx.fillRect(0,0,W,H);}
  if(milestoneFlash>0.01){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(0,0,W,H);}

  // particles (sorted big→small)
  particles.sort(function(a,b){return b.size-a.size;});
  for(var pi=0;pi<particles.length;pi++){
    var pp=particles[pi];
    var alpha=pp.life/pp.maxLife;
    var sz=pp.size*scale;
    if(alpha>0.5) sz+=alpha*3*scale;
    ctx.fillStyle=pp.color;
    ctx.beginPath(); ctx.arc(pp.x, pp.y, sz, 0, Math.PI*2); ctx.fill();
  }

  // HUD
  ctx.fillStyle='#fff';
  ctx.font='bold '+(34*scale)+'px Arial'; ctx.textAlign='center';
  ctx.fillText(score, W/2, 28*scale);
  if(combo>=3){
    ctx.fillStyle='#ffd700';
    ctx.font='bold '+(15*scale)+'px Arial';
    ctx.fillText(comboText||'x'+combo, W/2, 60*scale);
  }
  ctx.fillStyle='#556'; ctx.font=(9*scale)+'px Arial'; ctx.textAlign='right';
  ctx.fillText('best '+best, W-52*scale, 16*scale);
  if(milestoneFlash>0.1){
    ctx.fillStyle='#ffd700';
    ctx.font='bold '+(44*scale)+'px Arial'; ctx.textAlign='center';
    ctx.fillText(milestoneText, W/2, H/2);
  }

  // power bar
  if(charging){
    var bw=210*scale, bh=12*scale;
    var bbx=W/2-bw/2, bby=H-52*scale;
    ctx.fillStyle='#101030'; ctx.fillRect(bbx-4*scale,bby-4*scale,bw+8*scale,bh+8*scale);
    ctx.strokeStyle='#333'; ctx.lineWidth=1*scale;
    ctx.strokeRect(bbx-4*scale,bby-4*scale,bw+8*scale,bh+8*scale);
    var ratio=Math.min(power/maxPower,1);
    var fw=ratio*bw;
    var fg=ratio<0.35?'#2ed573':ratio<0.65?'#ffa502':'#ff4757';
    ctx.fillStyle=fg; ctx.fillRect(bbx,bby,fw,bh);
    if(fw>0){
      var pulse=(3+Math.random()*2)*scale;
      ctx.strokeStyle=fg; ctx.lineWidth=2*scale;
      ctx.beginPath(); ctx.arc(bbx+fw,bby+bh/2,pulse,0,Math.PI*2); ctx.stroke();
    }
    if(ratio>0.1){
      ctx.fillStyle='#fff';
      ctx.font='bold '+(10*scale)+'px Arial'; ctx.textAlign='center';
      ctx.fillText('松手跳跃!',W/2,bby-15*scale);
    }
  }

  // game over
  if(dead){
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold '+(30*scale)+'px Arial'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-45*scale);
    ctx.fillStyle='#ffd93d'; ctx.font=(18*scale)+'px Arial';
    ctx.fillText('得分 '+score,W/2,H/2);
    if(score>=best&&score>0){
      ctx.fillStyle='#ffd700'; ctx.font='bold '+(14*scale)+'px Arial';
      ctx.fillText('★ 新纪录! ★',W/2,H/2+30*scale);
    }
    ctx.fillStyle='#889'; ctx.font=(11*scale)+'px Arial';
    ctx.fillText('点击屏幕重新开始',W/2,H/2+60*scale);
  }else if(!flying&&!charging&&score===0){
    ctx.fillStyle='#667'; ctx.font=(11*scale)+'px Arial'; ctx.textAlign='center';
    ctx.fillText('按住屏幕蓄力 · 松手跳跃',W/2,H-28*scale);
  }

  // update star twinkle
  for(var si=0;si<stars.length;si++){
    var star=stars[si];
    star[2]+=star[3];
    if(star[2]>2.2||star[2]<0.15) star[3]=-star[3];
  }
}

initStars();
newGame();
requestAnimationFrame(tick);

})();
</script>
